name: Build Chrome Extension

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: |
          mkdir -p package
          cp manifest.json package/
          cp -r dist package/
          cp -r icons package/
          cp -r public/fonts package/fonts
          cd package
          zip -r ../simple-canvas.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-canvas
          path: simple-canvas.zip
          retention-days: 30

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: simple-canvas.zip
